<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-label="Pally Builds">
  <rect width="500" height="500" fill="#000000"/>
  <defs>
    <style>
      .logo-p, .logo-b {
        font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
        font-weight: 900;
        fill: #ffffff;
      }
      .logo-label {
        font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
        font-weight: 700;
        fill: #ffffff;
      }
    </style>
  </defs>
  <!-- Large P -->
  <text class="logo-p" x="68" y="348" font-size="238">P</text>
  <!-- Large B -->
  <text class="logo-b" x="244" y="338" font-size="212">B</text>
  <!-- PALLY label -->
  <text class="logo-label" x="262" y="174" font-size="48" letter-spacing="9">PALLY</text>
  <!-- BUILDS label -->
  <text class="logo-label" x="262" y="368" font-size="48" letter-spacing="3">BUILDS</text>
</svg>
